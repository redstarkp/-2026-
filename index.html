<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>레드 스타 조인트</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:
    radial-gradient(circle at top,#5f0000 0%,#170000 35%,#050505 100%);
    color:white;
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
}

.bg{
    position:absolute;
    inset:0;
    background:
    linear-gradient(rgba(255,255,255,0.03),transparent),
    repeating-linear-gradient(
        90deg,
        transparent,
        transparent 2px,
        rgba(255,0,0,0.03) 3px
    );
}

.glow{
    position:absolute;
    width:700px;
    height:700px;
    background:red;
    border-radius:50%;
    filter:blur(180px);
    opacity:.18;
}

.panel{
    position:relative;
    width:92%;
    max-width:1000px;

    background:rgba(20,20,20,0.55);

    border:1px solid rgba(255,255,255,0.08);

    backdrop-filter:blur(25px);

    border-radius:28px;

    padding:60px;

    box-shadow:
    0 0 40px rgba(255,0,0,.18),
    inset 0 1px 0 rgba(255,255,255,.08);
}

.logo{
    font-size:70px;
    font-weight:900;
    letter-spacing:5px;

    background:linear-gradient(
        to bottom,
        #ffffff,
        #ff8b8b,
        #ff2d2d
    );

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;

    margin-bottom:20px;
}

.sub{
    color:#d0d0d0;
    line-height:1.9;
    font-size:18px;
    max-width:700px;
}

.badge{
    margin-top:35px;

    display:inline-block;

    padding:14px 24px;

    border-radius:999px;

    background:linear-gradient(
        to bottom,
        rgba(255,80,80,.35),
        rgba(120,0,0,.55)
    );

    border:1px solid rgba(255,255,255,.12);

    box-shadow:
    inset 0 1px 0 rgba(255,255,255,.18),
    0 0 25px rgba(255,0,0,.25);

    font-size:13px;
    letter-spacing:2px;
}

.footer{
    margin-top:50px;
    color:#888;
    font-size:12px;
    border-top:1px solid rgba(255,255,255,.08);
    padding-top:20px;
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="glow"></div>

<div class="panel">

<div class="logo">
레드 스타 조인트
</div>

<div class="sub">
도시 통제 시스템 및 정부 관리 접근 전용 공식 플랫폼.
승인된 운영 인원만 접근 가능하며 중앙 관리 환경을 위해 설계되었습니다.
</div>

<div class="badge">
AUTHORIZED GOVERNMENT ACCESS
</div>

<div class="footer">
© 2026 레드 스타 조인트 — Official Administrative Infrastructure
</div>

</div>

</body>
</html>
