<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>레드 스타 조인트</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f1f1f1;
    color:#111;
}

.topbar{
    width:100%;
    background:#ffffff;
    border-bottom:1px solid #dcdcdc;
    padding:14px 20px;

    display:flex;
    align-items:center;
    justify-content:space-between;
}

.logo{
    font-size:18px;
    font-weight:700;
    letter-spacing:1px;
}

.status{
    font-size:12px;
    color:#666;
}

.container{
    width:100%;
    max-width:1000px;
    margin:auto;
    padding:25px 18px;
}

.panel{
    background:white;
    border:1px solid #dcdcdc;
    border-radius:8px;
    padding:25px;
}

.title{
    font-size:28px;
    font-weight:700;
    margin-bottom:14px;
}

.line{
    width:70px;
    height:3px;
    background:#444;
    margin-bottom:20px;
}

.desc{
    color:#444;
    line-height:1.8;
    font-size:15px;
}

.notice{
    margin-top:25px;
    padding:14px;
    background:#f7f7f7;
    border-left:4px solid #555;
    font-size:13px;
    color:#555;
}

.footer{
    margin-top:25px;
    color:#777;
    font-size:12px;
    text-align:center;
}
</style>
</head>

<body>

<div class="topbar">
    <div class="logo">레드 스타 조인트</div>
    <div class="status">ADMINISTRATIVE NETWORK</div>
</div>

<div class="container">

    <div class="panel">

        <div class="title">
            중앙 관리 시스템
        </div>

        <div class="line"></div>

        <div class="desc">
            본 플랫폼은 도시 통제 및 정부 관리 접근을 위한 공식 시스템입니다.
            승인된 관리자 및 운영 인원만 접근 가능하며,
            중앙 디지털 인프라 환경을 위해 유지·관리됩니다.
        </div>

        <div class="notice">
            Authorized Administrative Personnel Only
        </div>

    </div>

    <div class="footer">
        © 2026 레드 스타 조인트
    </div>

</div>

</body>
</html>
